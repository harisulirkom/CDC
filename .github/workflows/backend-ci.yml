name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, sqlite3, bcmath, curl, tokenizer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare app
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=$GITHUB_WORKSPACE/database/database.sqlite" >> .env
          php artisan key:generate
          php artisan migrate --force

      - name: Syntax check critical files
        run: |
          php -l app/Providers/AppServiceProvider.php
          php -l config/session.php
          php -l routes/api.php

      - name: Run lightweight secret scan
        run: php deploy/ubuntu/security/scan-secrets.php "$GITHUB_WORKSPACE"

      - name: Composer audit (collect)
        run: composer audit --format=json > composer-audit.json
        continue-on-error: true

      - name: Enforce composer audit policy (fail on high/critical if data available)
        run: php deploy/ubuntu/security/check-composer-audit.php composer-audit.json

      - name: Run tests
        run: php artisan test
