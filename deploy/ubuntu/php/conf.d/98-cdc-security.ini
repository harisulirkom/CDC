; CDC PHP Security Hardening (Production)
; Letakkan file ini di /etc/php/8.3/fpm/conf.d/98-cdc-security.ini

expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
html_errors = Off

; Session cookie hardening
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax

; Kurangi risiko path traversal via CGI
cgi.fix_pathinfo = 0

; Batasi upload abuse (selaraskan dengan Nginx)
upload_max_filesize = 32M
post_max_size = 32M
max_file_uploads = 10
